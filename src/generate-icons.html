<!DOCTYPE html>
<html>
<body>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function draw(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.167;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fillStyle = '#FF6B00';
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.5}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('NK', size / 2, size / 2 + size * 0.03);
}
draw(document.getElementById('c48'), 48);
draw(document.getElementById('c128'), 128);

// Right-click canvases to save as PNG
document.querySelectorAll('canvas').forEach(c => {
  const a = document.createElement('a');
  a.download = `icon${c.width}.png`;
  a.href = c.toDataURL('image/png');
  a.textContent = `Download icon${c.width}.png`;
  a.style.display = 'block';
  a.style.margin = '10px';
  document.body.appendChild(a);
});
</script>
</body>
</html>
